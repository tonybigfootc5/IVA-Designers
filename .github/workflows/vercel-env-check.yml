name: Vercel Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "vercel.json"
      - ".env.example"
      - "next.config.ts"
      - "prisma/**"
      - "src/**"

jobs:
  readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Production build check
        env:
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
          APP_URL: http://localhost:3000
        run: npm run build
